<section class="about-section">
  <div class="about-container">
    <div class="about-text">
      <h2>Requisitos de la permanencia en el programa</h2>

      <ul *ngIf="requisitosList.length > 0; else noData">
        <li *ngFor="let req of requisitosList" class="requisito-item">
          <!-- Vista normal -->
          <div *ngIf="editandoId !== req.id_requisito; else editMode" class="requisito-view">
            • {{ req.descripcion }}
            <div class="btn-group">
              <button class="editar-btn" (click)="editarRequisito(req)">Editar</button>
              <button class="eliminar-btn" (click)="eliminarRequisito(req)">Eliminar</button>
            </div>
          </div>

          <!-- Vista edición -->
          <ng-template #editMode>
            <input
              type="text"
              [(ngModel)]="editDescripcion"
              class="input-requisito"
              placeholder="Editar requisito"
            />
            <div class="btn-group">
              <button class="guardar-btn" (click)="guardarEdicion(req)">Guardar</button>
              <button class="cancelar-btn" (click)="cancelarEdicion()">Cancelar</button>
            </div>
          </ng-template>
        </li>
      </ul>

      <ng-template #noData>
        <p>No hay requisitos registrados.</p>
      </ng-template>

      <!-- Nuevo requisito -->
      <div *ngIf="nuevoRequisitoActivo" class="nuevo-requisito">
        <input
          type="text"
          [(ngModel)]="nuevoRequisito"
          placeholder="Escribe el nuevo requisito"
          class="input-requisito"
        />
        <button class="guardar-btn" (click)="guardarNuevo()">Guardar</button>
        <button class="cancelar-btn" (click)="cancelarNuevo()">Cancelar</button>
      </div>
    </div>
  </div>
</section>

<div class="actions">
  <button class="añadir-btnRequisito" (click)="mostrarInputNuevo()">Añadir Requisito</button>
</div>
